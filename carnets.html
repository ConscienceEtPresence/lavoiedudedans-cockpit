<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#f4f5f7" />
  <title>Carnets · Cockpit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/cockpit2.css?v=1" />
</head>
<body>
  <div class="c-top">
    <div class="c-top__in">
      <a class="c-back" id="back" href="index.html" aria-label="Retour">←</a>
      <div class="c-top__title"><span class="c-dot"></span><span>Carnets</span></div>
    </div>
  </div>

  <main class="c-wrap" id="mount"><div class="c-state">Chargement…</div></main>

  <script type="module">
    import { SITES, loadCarnetsList, esc } from './assets/js/cockpit-data.js';

    const key = (new URLSearchParams(location.search).get('site') === 'miroir') ? 'miroir' : 'dedans';
    const S = SITES[key];
    document.body.classList.add('world--' + key);
    document.getElementById('back').href = 'monde.html?site=' + key;
    document.title = 'Carnets · ' + S.nom;

    const detailHref = (id) => key === 'miroir' ? `miroir-carnet.html?id=${encodeURIComponent(id)}` : `carnet.html?site=dedans&id=${encodeURIComponent(id)}`;
    const initiale = (p) => (p && p.trim()) ? p.trim()[0].toUpperCase() : '·';
    const jadis = (ms) => { if (!ms) return '—'; const j = Math.floor((Date.now()-ms)/86400000); if (j<=0) return "aujourd'hui"; if (j===1) return 'hier'; if (j<7) return `il y a ${j} j`; if (j<30) return `il y a ${Math.floor(j/7)} sem`; return new Date(ms).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}); };

    (async () => {
      const mount = document.getElementById('mount');
      let list = [];
      try { list = await loadCarnetsList(key); } catch (e) { console.warn(e); }
      mount.innerHTML = `
        <div class="c-hero">
          <p class="c-hero__eyebrow">${esc(S.nom)}</p>
          <h1 class="c-hero__title">Carnets</h1>
          <p class="c-hero__sub">${list.length} carnet${list.length>1?'s':''} ouvert${list.length>1?'s':''}</p>
        </div>
        ${list.length ? `<div class="c-list">${list.map(c => `
          <a class="c-row" href="${detailHref(c.id)}">
            <span class="c-row__av">${esc(initiale(c.prenom))}</span>
            <span class="c-row__main">
              <span class="c-row__name">${c.prenom ? esc(c.prenom) : '<span style="color:#888e98">(anonyme)</span>'}</span>
              <span class="c-row__meta">${c.type ? 'type ' + esc(c.type) + ' · ' : ''}vu ${jadis(c.last)}</span>
            </span>
            <span class="c-row__n"><b>→</b></span>
          </a>`).join('')}</div>`
          : '<div class="c-card"><p class="c-empty">Aucun carnet pour l\'instant.</p></div>'}`;
    })();
  </script>
</body>
</html>
