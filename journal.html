<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#f4f5f7" />
  <title>Journal des visites · Cockpit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/cockpit2.css?v=2" />
</head>
<body>
  <div class="c-top">
    <div class="c-top__in">
      <a class="c-back" id="back" href="index.html" aria-label="Retour">←</a>
      <div class="c-top__title"><span class="c-dot"></span><span>Journal des visites</span></div>
    </div>
  </div>

  <main class="c-wrap" id="mount"><div class="c-state">Chargement…</div></main>

  <script type="module">
    import { SITES, loadAnalytics, labelPage, rawPath, esc } from './assets/js/cockpit-data.js';

    const params = new URLSearchParams(location.search);
    const key = SITES[params.get('site')] ? params.get('site') : 'dedans';
    const S = SITES[key];
    const wantedDays = parseInt(params.get('days') || '14', 10);
    const days = [7, 14, 30].includes(wantedDays) ? wantedDays : 14;
    document.body.classList.add('world--' + key);
    document.getElementById('back').href = 'monde.html?site=' + key;
    document.title = 'Journal · ' + S.nom;

    const rangeLink = n => {
      const cls = n === days ? 'c-btn' : 'c-btn c-btn--ghost';
      return `<a class="${cls}" href="journal.html?site=${key}&days=${n}">${n} jours</a>`;
    };

    const pageLine = (row, max) => {
      const unique = row.uniques != null
        ? ` <span style="font-weight:600;font-size:.8rem;color:var(--mute)">· ${row.uniques} pers.</span>`
        : '';
      return `<div class="c-bar">
        <span class="c-bar__lab" title="${esc(rawPath(row.page))}">${esc(labelPage(row.page))}</span>
        <span class="c-bar__n">${row.views}${unique}</span>
        <span class="c-bar__path">${esc(rawPath(row.page))}</span>
        <span class="c-bar__track"><span class="c-bar__fill" style="width:${Math.round(row.views / max * 100)}%"></span></span>
      </div>`;
    };

    (async () => {
      const mount = document.getElementById('mount');
      let a = null;
      try { a = await loadAnalytics(S.id, days); } catch (e) { console.warn(e); }
      if (!a) {
        mount.innerHTML = `<div class="c-card"><p class="c-empty">Les statistiques de visite ne sont pas disponibles.</p></div>`;
        return;
      }

      const rows = a.dayRows.slice().reverse();
      const hasDailyPageUniques = rows.some(d => d.pages.some(p => p.uniques != null));
      const daysHTML = rows.map(d => {
        const max = Math.max(1, ...d.pages.map(p => p.views));
        return `<section class="c-card c-journal-day">
          <div class="c-journal-day__head">
            <div>
              <h2 class="c-card__h"><span class="c-dot"></span>${esc(d.label)}</h2>
              <p class="c-journal-day__meta">${d.uniques} visiteur${d.uniques>1?'s':''} unique${d.uniques>1?'s':''} · ${d.pageviews} page${d.pageviews>1?'s':''} vue${d.pageviews>1?'s':''}</p>
            </div>
          </div>
          ${d.pages.length
            ? `<div class="c-bars">${d.pages.map(p => pageLine(p, max)).join('')}</div>`
            : '<p class="c-empty">Aucune visite enregistrée ce jour-là.</p>'}
        </section>`;
      }).join('');

      mount.innerHTML = `
        <div class="c-hero">
          <p class="c-hero__eyebrow">${esc(S.site)}</p>
          <h1 class="c-hero__title">Journal des visites</h1>
          <p class="c-hero__sub">Jour par jour, page par page. Les données restent anonymes : aucun nom, aucun email, aucun texte de carnet.</p>
        </div>
        <div class="c-links" style="margin-bottom:1.1rem">
          ${rangeLink(7)}
          ${rangeLink(14)}
          ${rangeLink(30)}
        </div>
        ${!hasDailyPageUniques ? `<div class="c-card c-note">
          <p>Les jours déjà enregistrés affichent les vues par page. Les personnes distinctes par page apparaîtront pour les nouvelles visites, dès que le compteur public enrichi sera déployé.</p>
        </div>` : ''}
        ${daysHTML}`;
    })();
  </script>
</body>
</html>
