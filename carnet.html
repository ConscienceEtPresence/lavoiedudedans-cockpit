<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#f4f5f7" />
  <title>Carnet · Cockpit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/cockpit2.css?v=1" />
</head>
<body class="world--dedans">
  <div class="c-top">
    <div class="c-top__in">
      <a class="c-back" href="carnets.html?site=dedans" aria-label="Retour">←</a>
      <div class="c-top__title"><span class="c-dot"></span><span>Carnet</span></div>
    </div>
  </div>

  <main class="c-wrap" id="mount"><div class="c-state">Chargement…</div></main>

  <script type="module">
    import { db } from './assets/js/firebase-init.js';
    import { collection, getDocs, doc, getDoc }
      from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { esc, tsToMs } from './assets/js/cockpit-data.js';

    const DATA = 'https://lavoiedudedans.fr/data/carnet/';
    const id = new URLSearchParams(location.search).get('id') || '';
    const mount = document.getElementById('mount');

    function dateLisible(s) {
      if (!s) return '';
      const [y, m, d] = s.split('-');
      return new Date(parseInt(y), parseInt(m)-1, parseInt(d))
        .toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    }

    (async () => {
      if (!id) { mount.innerHTML = '<div class="c-state">Aucun carnet sélectionné.</div>'; return; }
      try {
        const [vigRes, objRes] = await Promise.all([
          fetch(DATA + 'vigilances.json').then(r => r.json()).catch(() => ({})),
          fetch(DATA + 'objectifs.json').then(r => r.json()).catch(() => ({})),
        ]);
        const vigById = {}; for (const v of (vigRes.vigilances || [])) vigById[v.id] = v;
        const objById = {}; for (const o of (objRes.objectifs || [])) objById[o.id] = o;
        const ST = { tenu: 'tenu', parfois: 'parfois', oublie: 'oublié', repris: 'à reprendre' };
        const labVig = v => vigById[v]?.label || v || '';
        const labObj = o => objById[o]?.matin?.libelle || o || '';
        const vigOf = o => objById[o]?.vigilance || '';

        const profilSnap = await getDoc(doc(db, 'carnets', id, '_meta', 'profil'));
        const profil = profilSnap.exists() ? profilSnap.data() : {};
        const prenom = profil.prenom || '';
        const first = tsToMs(profil.firstSeen), last = tsToMs(profil.lastSeen);

        const joursSnap = await getDocs(collection(db, 'carnets', id, 'jours'));
        const jours = []; joursSnap.forEach(d => jours.push({ date: d.id, data: d.data() }));
        jours.sort((a, b) => b.date.localeCompare(a.date));
        document.title = (prenom || id) + ' · Cockpit';

        const bloc = (l, inner) => `<div class="c-bloc"><p class="c-bloc__l">${l}</p>${inner}</div>`;
        const chips = arr => `<div class="c-chips">${arr.map(c => `<span class="c-chip">${esc(c)}</span>`).join('')}</div>`;
        const para = v => `<p class="c-bloc__p">${esc(v)}</p>`;

        const RST = { vecu: 'habité', traverse: 'traversé', manque: 'manqué' };
        const vigsDeR = r => (Array.isArray(r.vigilanceIds) && r.vigilanceIds.length)
          ? r.vigilanceIds : (r.vigilanceId ? [r.vigilanceId] : []);

        const renderNouveau = (m, s, recueils) => {
          const objs = (m.objectifs && m.objectifs.length) ? m.objectifs
            : (m.objectifsIds || []).map(o => ({ id: o, vigilance: vigOf(o) || m.vigilanceId }));
          const vigs = [...new Set(objs.map(o => o.vigilance).filter(Boolean))];
          const bil = s.bilansObjectifs || {};
          const out = [];
          if (vigs.length) out.push(bloc(`Vigilance${vigs.length>1?'s':''}`, chips(vigs.map(labVig))));
          if (m.ancrage) out.push(bloc('Ce qui se joue', para('« ' + m.ancrage + ' »')));
          if (objs.length) out.push(bloc('Objectifs portés', objs.map(o => {
            const b = bil[o.id];
            const st = b?.statut ? `<span class="c-st c-st--${esc(b.statut)}">${esc(ST[b.statut]||b.statut)}</span>` : '';
            const note = b?.note ? `<p class="c-bloc__p" style="font-size:.95rem; margin:.1rem 0 0;">${esc(b.note)}</p>` : '';
            return `<div class="c-obj"><span class="c-obj__theme">${esc(labVig(o.vigilance))}</span><br><span class="c-obj__lib">${esc(labObj(o.id))}</span>${st}${note}</div>`;
          }).join('')));
          if (m.personnel) {
            const bp = s.bilanPersonnel;
            const st = bp?.statut ? `<span class="c-st c-st--${esc(bp.statut)}">${esc(ST[bp.statut]||bp.statut)}</span>` : '';
            out.push(bloc('Objectif personnel', `<p class="c-bloc__p">${esc(m.personnel)}${st}</p>` + (bp?.note ? para(bp.note) : '')));
          }
          if (recueils && recueils.length) {
            const rs = recueils.slice().sort((a, b) => (a.le || 0) - (b.le || 0));
            out.push(bloc('Pendant la journée · recueils', rs.map(r => {
              const themes = vigsDeR(r).map(labVig).filter(Boolean);
              const precis = (r.objectifsIds || []).map(labObj).filter(Boolean);
              const stR = r.statut ? `<span class="c-st c-st--${esc(r.statut)}">${esc(RST[r.statut] || r.statut)}${r.statut === 'vecu' ? ' ✦' : ''}</span>` : '';
              const themeHTML = themes.length ? `<span class="c-obj__theme">${esc(themes.join(' · '))}</span><br>` : '';
              const lib = r.texte ? esc(r.texte) : (precis.length ? esc(precis.join(' · ')) : '<em style="color:#888e98">(noté sans texte)</em>');
              const pre = (r.texte && precis.length) ? `<p class="c-bloc__p" style="font-size:.92rem;margin:.15rem 0 0;">↳ ${esc(precis.join(' · '))}</p>` : '';
              const appr = r.apprentissage ? `<p class="c-bloc__p" style="font-size:.92rem;margin:.15rem 0 0;"><em>« ${esc(r.apprentissage)} »</em></p>` : '';
              return `<div class="c-obj">${themeHTML}<span class="c-obj__lib">${lib}</span>${stR}${pre}${appr}</div>`;
            }).join('')));
          }
          if (s.presente) out.push(bloc("Ce qui s'est présenté", para(s.presente)));
          if (s.gratitudeNote) out.push(bloc('Gratitude', para(s.gratitudeNote)));
          if (s.repriseTexte) out.push(bloc('Pour demain', para(s.repriseTexte)));
          return out;
        };
        const renderAncien = (m, s) => {
          const out = [];
          if (m.contextes?.length) out.push(bloc('Matin · Contextes', chips(m.contextes)));
          if (m.axes?.length) out.push(bloc('Matin · Axes', chips(m.axes)));
          if (m.adab) out.push(bloc('Matin · Adab', para(m.adab)));
          if (m.geste) out.push(bloc('Matin · Geste', para(m.geste)));
          if (m.note) out.push(bloc('Matin · Note', para(m.note)));
          if (s.mouvements?.length) out.push(bloc('Soir · Mouvements', chips(s.mouvements)));
          if (s.ceQuiAPousse?.length) out.push(bloc('Soir · Ce qui a poussé', chips(s.ceQuiAPousse)));
          if (s.gratitudeNote) out.push(bloc('Soir · Gratitude', para(s.gratitudeNote)));
          if (s.repriseDemain?.texte) out.push(bloc('Soir · Reprise', para(s.repriseDemain.texte)));
          return out;
        };

        const renderJour = (j) => {
          const m = j.data.matin || {}, s = j.data.soir || {};
          const estNouveau = !!(m.vigilanceId || (m.objectifs && m.objectifs.length) || (m.objectifsIds && m.objectifsIds.length));
          const blocs = estNouveau ? renderNouveau(m, s, j.data.recueils || []) : renderAncien(m, s);
          const badge = s.fermeLe ? '<span class="c-badge c-badge--depose">déposé</span>'
            : (m.poseLe ? '<span class="c-badge c-badge--pose">posé</span>' : '');
          return `<div class="c-jour"><h3 class="c-jour__date">${dateLisible(j.date)} ${badge}</h3>
            ${blocs.length ? blocs.join('') : '<p class="c-empty">Jour ouvert mais rien de noté.</p>'}</div>`;
        };

        mount.innerHTML = `
          <div class="c-hero">
            <p class="c-hero__eyebrow">La voie du dedans</p>
            <h1 class="c-hero__title">${prenom ? esc(prenom) : '<span style="color:#888e98">(anonyme)</span>'}</h1>
            <p class="c-hero__sub">${jours.length} journée${jours.length>1?'s':''} ·
              première visite ${first ? new Date(first).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}) : '—'} ·
              dernière ${last ? new Date(last).toLocaleDateString('fr-FR',{day:'numeric',month:'long'}) : '—'}</p>
          </div>
          ${jours.length ? jours.map(renderJour).join('') : '<div class="c-card"><p class="c-empty">Aucune journée notée.</p></div>'}`;
      } catch (e) {
        console.error(e);
        mount.innerHTML = `<div class="c-state">Erreur : ${esc(e.message || e)}</div>`;
      }
    })();
  </script>
</body>
</html>
