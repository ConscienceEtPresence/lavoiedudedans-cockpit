<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#f4f5f7" />
  <title>Vue d'ensemble · Cockpit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/cockpit2.css?v=2" />
</head>
<body>
  <div class="c-top">
    <div class="c-top__in">
      <a class="c-back" href="index.html" aria-label="Retour">←</a>
      <div class="c-top__title"><span class="c-dot"></span><span id="top-nom">…</span></div>
    </div>
  </div>

  <main class="c-wrap" id="mount">
    <div class="c-state">Chargement…</div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script type="module">
    import { SITES, loadAnalytics, loadMonthly, loadCarnetAggregate, aggBySection, labelPage, rawPath, esc } from './assets/js/cockpit-data.js';

    const p = new URLSearchParams(location.search).get('site');
    const key = SITES[p] ? p : 'dedans';
    const S = SITES[key];
    document.body.classList.add('world--' + key);
    document.getElementById('top-nom').textContent = S.nom;
    document.title = S.nom + ' · Cockpit';

    const mount = document.getElementById('mount');

    (async () => {
      let a = null, mo = null, agg = null;
      try { a = await loadAnalytics(S.id, 30); } catch (e) { console.warn(e); }
      try { mo = await loadMonthly(S.id); } catch (e) { console.warn(e); }
      try { agg = await loadCarnetAggregate(key); } catch (e) { console.warn(e); }

      const kpi = (n, l, accent) => `<div class="c-kpi ${accent ? 'c-kpi--accent' : ''}"><span class="c-kpi__n">${n}</span><div class="c-kpi__l">${l}</div></div>`;
      const sum = (rows, field) => rows.reduce((total, row) => total + (row[field] || 0), 0);
      const sumMap = (rows, field) => rows.reduce((map, row) => {
        for (const [k, v] of Object.entries(row[field] || {})) map[k] = (map[k] || 0) + v;
        return map;
      }, {});
      const trend = (now, before) => {
        const diff = now - before;
        const pct = before ? Math.round(diff / before * 100) : (now ? 100 : 0);
        const cls = diff > 0 ? 'is-up' : diff < 0 ? 'is-down' : 'is-flat';
        const sign = diff > 0 ? '+' : '';
        return `<span class="c-trend ${cls}">${sign}${diff} · ${sign}${pct}%</span>`;
      };
      const mapBars = (map, labels, empty) => {
        const arr = Object.entries(map || {}).filter(([, n]) => n > 0).sort((a, b) => b[1] - a[1]);
        const max = arr[0]?.[1] || 1;
        return arr.length ? `<div class="c-bars">${arr.map(([k, n]) => `
          <div class="c-bar">
            <span class="c-bar__lab">${esc(labels[k] || k)}</span>
            <span class="c-bar__n">${n}</span>
            <span class="c-bar__track"><span class="c-bar__fill" style="width:${Math.round(n/max*100)}%"></span></span>
          </div>`).join('')}</div>` : `<p class="c-empty">${empty}</p>`;
      };

      // KPIs — aujourd'hui & 7j (quotidien) + ce mois (distinct réel)
      const kpisHTML = a ? `
        <div class="c-kpis">
          ${kpi(a.uToday, "visiteurs aujourd'hui", true)}
          ${kpi(a.u7, 'sur 7 jours')}
          ${kpi(mo ? mo.uniques : '—', 'personnes distinctes · ce mois')}
          ${kpi(mo ? mo.pageviews : a.pv30, mo ? 'pages vues · ce mois' : 'pages vues · 30 j')}
        </div>` : `<div class="c-card"><p class="c-empty">Les statistiques de visite ne sont pas encore disponibles.</p></div>`;

      const maxWeek = Math.max(1, ...(a?.weekRows || []).map(d => Math.max(d.uniques, d.pageviews)));
      const weekHTML = a?.weekRows?.length ? `
        <div class="c-card">
          <h2 class="c-card__h"><span class="c-dot"></span>Semaine en détail</h2>
          <div class="c-week">
            ${a.weekRows.map(d => `
              <div class="c-day">
                <div class="c-day__top">
                  <span class="c-day__name">${esc(d.shortLabel)}</span>
                  <span class="c-day__date">${esc(d.label.replace('.', ''))}</span>
                </div>
                <div class="c-day__nums">
                  <b>${d.uniques}</b><span>personne${d.uniques>1?'s':''}</span>
                  <b>${d.pageviews}</b><span>vue${d.pageviews>1?'s':''}</span>
                </div>
                <span class="c-day__track"><span class="c-day__fill" style="width:${Math.round(d.uniques/maxWeek*100)}%"></span></span>
              </div>`).join('')}
          </div>
          <p style="color:var(--mute);font-size:.85rem;margin:1rem 0 0">“Personnes” = visiteurs uniques anonymes du jour, estimés par navigateur. “Vues” = pages ouvertes.</p>
          <div class="c-links" style="margin-top:1rem"><a class="c-btn c-btn--ghost" href="journal.html?site=${key}&days=14">Voir jour par jour →</a></div>
        </div>` : '';

      const currentWeek = a?.dayRows?.slice(-7) || [];
      const previousWeek = a?.dayRows?.slice(-14, -7) || [];
      const nowU = sum(currentWeek, 'uniques'), prevU = sum(previousWeek, 'uniques');
      const nowPv = sum(currentWeek, 'pageviews'), prevPv = sum(previousWeek, 'pageviews');
      const compareHTML = a ? `
        <div class="c-card">
          <h2 class="c-card__h"><span class="c-dot"></span>Comparaison avec la semaine précédente</h2>
          <div class="c-compare">
            <div class="c-compare__item">
              <span class="c-compare__label">Visiteurs uniques</span>
              <b>${nowU}</b>
              <span class="c-compare__sub">semaine précédente : ${prevU}</span>
              ${trend(nowU, prevU)}
            </div>
            <div class="c-compare__item">
              <span class="c-compare__label">Pages vues</span>
              <b>${nowPv}</b>
              <span class="c-compare__sub">semaine précédente : ${prevPv}</span>
              ${trend(nowPv, prevPv)}
            </div>
          </div>
        </div>` : '';

      const periodLabels = { matin: 'Matin', apres_midi: 'Après-midi', soir: 'Soir', nuit: 'Nuit' };
      const periodViews = sumMap(a?.dayRows || [], 'periods');
      const periodUniques = sumMap(a?.dayRows || [], 'uniquePeriods');
      const hasMomentData = Object.values(periodViews).some(Boolean);
      const momentsHTML = a ? `
        <div class="c-card">
          <h2 class="c-card__h"><span class="c-dot"></span>Moments de visite · 30 jours</h2>
          ${mapBars(periodViews, periodLabels, 'Les moments de visite se rempliront avec les prochaines visites.')}
          ${Object.values(periodUniques).some(Boolean) ? `<p style="color:var(--mute);font-size:.85rem;margin:1rem 0 0">Personnes distinctes par moment : ${Object.entries(periodUniques).map(([k,n]) => `${esc(periodLabels[k] || k)} ${n}`).join(' · ')}</p>` : ''}
        </div>` : '';

      const sourceLabels = {
        direct: 'Accès direct',
        interne: 'Navigation interne',
        google: 'Google',
        recherche: 'Autre recherche',
        lavoiedudedans: 'Depuis La voie du dedans',
        lemiroirinterieur: 'Depuis Le miroir intérieur',
        social: 'Réseaux sociaux',
        autre: 'Autres sites',
      };
      const sources = sumMap(a?.dayRows || [], 'sources');
      const sourcesHTML = a ? `
        <div class="c-card">
          <h2 class="c-card__h"><span class="c-dot"></span>Sources d'arrivée · 30 jours</h2>
          ${mapBars(sources, sourceLabels, "Les sources d'arrivée se rempliront avec les prochaines nouvelles visites.")}
          <p style="color:var(--mute);font-size:.85rem;margin:1rem 0 0">Comptage anonyme : une source par visiteur unique et par jour, classée sans conserver l'URL complète.</p>
        </div>` : '';

      // Pages les plus visitées (ce mois) : vues + personnes distinctes
      const va = mo?.viewsArr || (a?.topPages || []);
      const top = va.slice(0, 8);
      const maxP = top[0]?.[1] || 1;
      const pagesHTML = `
        <div class="c-card">
          <h2 class="c-card__h"><span class="c-dot"></span>Pages les plus visitées${mo ? ' · ce mois' : ''}</h2>
          ${top.length ? `<div class="c-bars">${top.map(([p, n]) => {
            const u = mo?.pageUniques?.[p];
            return `<div class="c-bar">
              <span class="c-bar__lab" title="${esc(rawPath(p))}">${esc(labelPage(p, S.id))}</span>
              <span class="c-bar__n">${n}${u != null ? ` <span style="font-weight:600;font-size:.8rem;color:var(--mute)">· ${u} pers.</span>` : ''}</span>
              <span class="c-bar__path">${esc(rawPath(p))}</span>
              <span class="c-bar__track"><span class="c-bar__fill" style="width:${Math.round(n/maxP*100)}%"></span></span>
            </div>`;
          }).join('')}</div>
            <p style="color:var(--mute);font-size:.85rem;margin:.9rem 0 0">« pers. » = personnes distinctes ce mois · le grand chiffre = vues (répétitions incluses)</p>
            <div class="c-links" style="margin-top:1rem"><a class="c-btn c-btn--ghost" href="pages.html?site=${key}">Toutes les pages →</a></div>`
            : '<p class="c-empty">Pas encore de pages enregistrées.</p>'}
        </div>`;

      // Par section
      const fallbackViews = Object.fromEntries(a?.allPages || []);
      const secs = mo ? aggBySection(mo.views, mo.pageUniques) : aggBySection(fallbackViews);
      const maxS = secs[0]?.views || 1;
      const sectionHTML = secs.length ? `
        <div class="c-card">
          <h2 class="c-card__h"><span class="c-dot"></span>Par grande section${mo ? ' · ce mois' : ' · 30 jours'}</h2>
          <div class="c-bars">${secs.map(s => `
            <div class="c-bar">
              <span class="c-bar__lab">${esc(s.label)}</span>
              <span class="c-bar__n">${s.views}${s.uniques != null ? ` <span style="font-weight:600;font-size:.8rem;color:var(--mute)">· ${s.uniques} pers.</span>` : ''}</span>
              <span class="c-bar__track"><span class="c-bar__fill" style="width:${Math.round(s.views/maxS*100)}%"></span></span>
            </div>`).join('')}</div>
        </div>` : '';

      // Courbe
      const chartHTML = a && a.labels.length ? `
        <div class="c-card">
          <h2 class="c-card__h"><span class="c-dot"></span>Visiteurs uniques · 30 jours</h2>
          <div class="c-chart"><canvas id="chart"></canvas></div>
        </div>` : '';

      // Entonnoir carnet
      let funnelHTML = '';
      if (agg) {
        const t = agg.total || 0;
        const pct = n => t ? Math.round(n / t * 100) : 0;
        const w = n => t ? Math.max(14, Math.round(n / t * 100)) : 14;
        funnelHTML = `
          <div class="c-card">
            <h2 class="c-card__h"><span class="c-dot"></span>Le carnet, en usage</h2>
            <div class="c-funnel">
              <div class="c-step"><div class="c-step__bar" style="width:100%">${agg.total}</div>
                <div><div class="c-step__lab">carnets ouverts</div></div></div>
              <div class="c-step"><div class="c-step__bar c-step__bar--2" style="width:${w(agg.posers)}%">${agg.posers}</div>
                <div><div class="c-step__lab">posent une journée</div><div class="c-step__pct">${pct(agg.posers)} %</div></div></div>
              <div class="c-step"><div class="c-step__bar c-step__bar--3" style="width:${w(agg.deposers)}%">${agg.deposers}</div>
                <div><div class="c-step__lab">déposent le soir</div><div class="c-step__pct">${pct(agg.deposers)} %</div></div></div>
            </div>
            <p style="color:var(--mute); margin:1rem 0 0; font-size:.95rem;">${agg.actifs7} actif${agg.actifs7>1?'s':''} ces 7 derniers jours · ${agg.joursTotal} journées posées au total</p>
            <div class="c-links" style="margin-top:1rem"><a class="c-btn" href="carnets.html?site=${key}">Voir tous les carnets →</a></div>
          </div>`;
      }

      // Top vigilances / objectifs (dedans)
      let rankHTML = '';
      if (agg && agg.topVigilances?.length) {
        const rank = (title, arr) => `
          <div class="c-card">
            <h2 class="c-card__h"><span class="c-dot"></span>${title}</h2>
            <div class="c-rank">${arr.map((x, i) => `
              <div class="c-rank__row">
                <span class="c-rank__pos">${i+1}</span>
                <span class="c-rank__lab">${esc(x.label)}</span>
                <span class="c-rank__n">${x.n}×</span>
              </div>`).join('')}</div>
          </div>`;
        rankHTML = rank('Vigilances les plus portées', agg.topVigilances)
                 + (agg.topObjectifs?.length ? rank('Objectifs les plus choisis', agg.topObjectifs.slice(0, 8)) : '');
      }

      const alerts = [];
      if (prevU > 0 && nowU >= prevU * 1.3 && nowU - prevU >= 3) alerts.push(`Hausse nette des visiteurs cette semaine : ${nowU} contre ${prevU}.`);
      if (prevU >= 3 && nowU <= prevU * .7) alerts.push(`Baisse sensible des visiteurs cette semaine : ${nowU} contre ${prevU}.`);
      if (prevPv > 0 && nowPv >= prevPv * 1.4 && nowPv - prevPv >= 8) alerts.push(`Les pages vues montent plus vite que les visiteurs : les personnes explorent davantage.`);
      if (hasMomentData) {
        const topPeriod = Object.entries(periodViews).sort((a, b) => b[1] - a[1])[0];
        const totalPeriod = Object.values(periodViews).reduce((n, v) => n + v, 0);
        if (topPeriod && totalPeriod && topPeriod[1] / totalPeriod >= .45) alerts.push(`Moment dominant : ${periodLabels[topPeriod[0]] || topPeriod[0]} représente ${Math.round(topPeriod[1] / totalPeriod * 100)} % des vues récentes.`);
      }
      if (!Object.values(sources).some(Boolean)) alerts.push("Les sources d'arrivée commenceront à parler après le déploiement des nouveaux compteurs.");
      if (!alerts.length) alerts.push('Rien de particulier à signaler : l’activité semble stable sur les derniers jours.');
      const alertsHTML = a ? `
        <div class="c-card">
          <h2 class="c-card__h"><span class="c-dot"></span>Alertes douces</h2>
          <div class="c-alerts">${alerts.map(x => `<div class="c-alert">${esc(x)}</div>`).join('')}</div>
        </div>` : '';

      mount.innerHTML = `
        <div class="c-hero">
          <p class="c-hero__eyebrow">${esc(S.site)}</p>
          <h1 class="c-hero__title">${esc(S.nom)}</h1>
        </div>
        ${kpisHTML}
        <div style="height:1.1rem"></div>
        ${compareHTML}
        ${alertsHTML}
        ${weekHTML}
        ${momentsHTML}
        ${sourcesHTML}
        ${chartHTML}
        ${sectionHTML}
        ${pagesHTML}
        ${funnelHTML}
        ${rankHTML}`;

      // Dessine la courbe
      if (a && a.labels.length && window.Chart) {
        new Chart(document.getElementById('chart'), {
          type: 'line',
          data: { labels: a.labels, datasets: [{
            data: a.uniques, borderColor: S.accent, backgroundColor: S.accent + '22',
            borderWidth: 3, fill: true, tension: .35, pointRadius: 0, pointHoverRadius: 5 }] },
          options: { responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { grid: { display: false }, ticks: { color: '#888e98', maxTicksLimit: 7, font: { size: 12 } } },
                      y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { color: '#888e98', precision: 0, font: { size: 12 } } } } }
        });
      }
    })();
  </script>
</body>
</html>
