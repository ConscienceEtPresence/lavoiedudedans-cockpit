<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#f4f5f7" />
  <title>Pages visitées · Cockpit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/cockpit2.css?v=1" />
</head>
<body>
  <div class="c-top">
    <div class="c-top__in">
      <a class="c-back" id="back" href="index.html" aria-label="Retour">←</a>
      <div class="c-top__title"><span class="c-dot"></span><span>Pages visitées</span></div>
    </div>
  </div>

  <main class="c-wrap" id="mount"><div class="c-state">Chargement…</div></main>

  <script type="module">
    import { SITES, loadAnalytics, loadMonthly, labelPage, rawPath, esc } from './assets/js/cockpit-data.js';

    const p = new URLSearchParams(location.search).get('site');
    const key = SITES[p] ? p : 'dedans';
    const S = SITES[key];
    document.body.classList.add('world--' + key);
    document.getElementById('back').href = 'monde.html?site=' + key;
    document.title = 'Pages · ' + S.nom;

    (async () => {
      const mount = document.getElementById('mount');
      let mo = null, a = null;
      try { mo = await loadMonthly(S.id); } catch (e) {}
      if (!mo) { try { a = await loadAnalytics(S.id, 30); } catch (e) {} }
      const arr = mo ? mo.viewsArr : (a ? a.allPages : []);
      const uniq = mo ? mo.pageUniques : null;
      const total = mo ? mo.totalViews : (a ? a.totalPv : 0);
      const periode = mo ? 'ce mois' : '30 jours';
      if (!arr.length) {
        mount.innerHTML = `<div class="c-hero"><p class="c-hero__eyebrow">${esc(S.nom)}</p><h1 class="c-hero__title">Pages visitées</h1></div><div class="c-card"><p class="c-empty">Pas encore de données de visite.</p></div>`;
        return;
      }
      const max = arr[0][1] || 1;
      mount.innerHTML = `
        <div class="c-hero">
          <p class="c-hero__eyebrow">${esc(S.nom)} · ${periode}</p>
          <h1 class="c-hero__title">Pages visitées</h1>
          <p class="c-hero__sub">${arr.length} pages · ${total} vues au total</p>
        </div>
        <div class="c-card">
          <div class="c-bars">
            ${arr.map(([p, n]) => {
              const u = uniq ? uniq[p] : null;
              return `<div class="c-bar">
                <span class="c-bar__lab" title="${esc(rawPath(p))}">${esc(labelPage(p))}</span>
                <span class="c-bar__n">${n}${u != null ? ` <span style="font-weight:600;font-size:.8rem;color:var(--mute)">· ${u} pers.</span>` : ''}</span>
                <span class="c-bar__path">${esc(rawPath(p))} · ${Math.round(n/total*100)} %</span>
                <span class="c-bar__track"><span class="c-bar__fill" style="width:${Math.round(n/max*100)}%"></span></span>
              </div>`;
            }).join('')}
          </div>
          <p style="color:var(--mute);font-size:.85rem;margin:1rem 0 0">Le grand chiffre = vues · « pers. » = personnes distinctes ce mois.</p>
        </div>`;
    })();
  </script>
</body>
</html>
