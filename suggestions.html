<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#f4f5f7" />
  <title>Retours · Cockpit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/cockpit2.css?v=1" />
  <style>
    body { --accent:#5b6470; --accent-soft:#eceef1; --accent-deep:#3c434d; }
    .c-sug__msg { font-size: 1.1rem; line-height: 1.55; color: var(--ink); margin: .6rem 0 0; }
    .c-sug__act { display:flex; flex-wrap:wrap; gap:.5rem; margin-top:1rem; }
    .c-mini { padding:.55rem .9rem; border-radius:999px; border:1px solid var(--line); background:var(--card); color:var(--ink-2); font-weight:600; font-size:.9rem; cursor:pointer; }
    .c-mini--danger { color:#b4453a; }
    .is-read { opacity:.62; }
  </style>
</head>
<body>
  <div class="c-top">
    <div class="c-top__in">
      <a class="c-back" href="index.html" aria-label="Retour">←</a>
      <div class="c-top__title"><span class="c-dot"></span><span>Les retours</span></div>
    </div>
  </div>

  <main class="c-wrap" id="mount"><div class="c-state">Chargement…</div></main>

  <script type="module">
    import { db } from './assets/js/firebase-init.js';
    import { collection, getDocs, doc, updateDoc, deleteDoc }
      from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { esc } from './assets/js/cockpit-data.js';

    const mount = document.getElementById('mount');
    function relatif(ts) {
      if (!ts) return '';
      try {
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        const j = Math.floor((Date.now() - d.getTime()) / 86400000);
        const h = Math.floor((Date.now() - d.getTime()) / 3600000);
        if (h < 1) return "à l'instant"; if (h < 24) return `il y a ${h} h`;
        if (j === 1) return 'hier'; if (j < 30) return `il y a ${j} j`;
        return d.toLocaleDateString('fr-FR', { day:'numeric', month:'long' });
      } catch { return ''; }
    }
    const STAT = { neuve:'nouveau', lue:'lu', enroute:'en route' };

    async function load() {
      const snap = await getDocs(collection(db, 'suggestions'));
      const arr = []; snap.forEach(d => arr.push({ id: d.id, ...d.data() }));
      arr.sort((a, b) => (b.creeLe?.toMillis?.()||0) - (a.creeLe?.toMillis?.()||0));
      return arr;
    }
    function render(sugs) {
      mount.innerHTML = `
        <div class="c-hero"><p class="c-hero__eyebrow">Les deux sites</p><h1 class="c-hero__title">Les retours</h1>
          <p class="c-hero__sub">${sugs.length} message${sugs.length>1?'s':''} reçu${sugs.length>1?'s':''}</p></div>
        ${sugs.length ? sugs.map(s => {
          const st = s.statut || 'neuve';
          return `<div class="c-card ${st!=='neuve'?'is-read':''}" data-id="${esc(s.id)}">
            <div style="display:flex;align-items:baseline;gap:.7rem;flex-wrap:wrap">
              <strong style="font-size:1.15rem">${esc(s.prenom || 'Anonyme')}</strong>
              <span style="color:var(--mute);font-size:.9rem">${relatif(s.creeLe)}</span>
              <span class="c-badge" style="background:var(--accent-soft);color:var(--accent-deep)">${STAT[st]||st}</span>
            </div>
            <p class="c-sug__msg">${esc(s.message || '')}</p>
            <div class="c-sug__act">
              ${st!=='lue'?`<button class="c-mini" data-act="lue" data-id="${esc(s.id)}">Marquer lu</button>`:''}
              ${st!=='enroute'?`<button class="c-mini" data-act="enroute" data-id="${esc(s.id)}">À mettre en route</button>`:''}
              <button class="c-mini c-mini--danger" data-act="suppr" data-id="${esc(s.id)}">Supprimer</button>
            </div>
          </div>`;
        }).join('') : '<div class="c-card"><p class="c-empty">Aucun retour pour l\'instant.</p></div>'}`;
      mount.querySelectorAll('[data-act]').forEach(b => b.addEventListener('click', () => action(b.dataset.act, b.dataset.id)));
    }
    async function action(act, id) {
      try {
        if (act === 'suppr') { if (!confirm('Supprimer définitivement ?')) return; await deleteDoc(doc(db,'suggestions',id)); }
        else await updateDoc(doc(db,'suggestions',id), { statut: act });
        render(await load());
      } catch (e) { console.error(e); alert('Une difficulté. Réessayez.'); }
    }
    (async () => { try { render(await load()); } catch (e) { mount.innerHTML = `<div class="c-state">Erreur de chargement.</div>`; } })();
  </script>
</body>
</html>
