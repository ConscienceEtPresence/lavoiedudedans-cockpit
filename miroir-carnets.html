<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Carnets ennéagramme · Cockpit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Amiri:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/cockpit.css?v=2" />

  <style>
    .ck-carnets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
      margin: 1rem 0 2rem;
    }
    .ck-carnet-card {
      display: block;
      padding: 1.1rem 1.2rem;
      background: linear-gradient(170deg, #FFFDF8, #FFF5D8);
      border: 1px solid var(--gold-soft, rgba(192,160,80,0.4));
      border-left: 4px solid var(--gold);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: transform .15s, box-shadow .15s, border-color .15s;
    }
    .ck-carnet-card:hover {
      transform: translateY(-2px);
      border-color: #c0a050;
      box-shadow: 0 8px 24px -10px rgba(192,160,80,0.45);
    }
    .ck-carnet-card__prenom {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 500;
      color: #2a1f08;
      margin: 0 0 .25rem;
    }
    .ck-carnet-card__type {
      display: inline-block;
      margin: 0 0 .5rem;
      padding: .15rem .6rem;
      background: #2a1f08;
      color: #f5d77b;
      border-radius: 999px;
      font-size: .8rem;
      font-weight: 500;
    }
    .ck-carnet-card__anon {
      font-family: 'Courier New', monospace;
      font-size: .72rem;
      color: #8a7a55;
      letter-spacing: .02em;
      margin: 0 0 .55rem;
      word-break: break-all;
    }
    .ck-carnet-card__when {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: #4a3a18;
      font-size: .95rem;
      margin: 0;
    }
    .ck-carnet-card__count {
      display: inline-block;
      margin-top: .5rem;
      padding: .2rem .6rem;
      background: rgba(192,160,80,0.15);
      border-radius: 999px;
      font-size: .82rem;
      color: #6a5520;
    }
    .ck-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--ink-mute, #8a7a55);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
    }
    .ck-tools {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      margin: 0 0 1rem;
    }
    .ck-tools input, .ck-tools select {
      padding: .55rem .9rem;
      border: 1px solid var(--line, rgba(192,160,80,0.3));
      border-radius: 8px;
      background: #FFFDF8;
      font-family: inherit;
      font-size: .95rem;
    }
    .ck-tools input { flex: 1; min-width: 14rem; }
    .ck-summary {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin: 1rem 0 1.5rem;
    }
    .ck-summary__card {
      padding: .85rem 1.1rem;
      background: var(--paper, #FFFDF8);
      border: 1px solid var(--line, rgba(192,160,80,0.3));
      border-radius: 10px;
      text-align: center;
      min-width: 6rem;
    }
    .ck-summary__n {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      color: var(--gold, #c0a050);
      font-weight: 500;
      line-height: 1;
    }
    .ck-summary__l {
      display: block;
      font-size: .76rem;
      letter-spacing: .08em;
      color: var(--ink-mute, #8a7a55);
      margin-top: .3rem;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header class="ck-head">
    <div class="ck-head__inner">
      <div class="ck-head__brand">Cockpit</div>
      <nav class="ck-head__nav">
        <a href="./carnets.html">Carnets ouverts</a>
        <a href="./miroir-carnets.html" class="is-active">Carnets ennéagramme</a>
        <a href="./tableau-de-bord.html">Ancien (Voie/Miroir)</a>
        <a href="./suggestions.html">Suggestions</a>
      </nav>
    </div>
  </header>

  <main class="ck-main">
    <h1 class="ck-title">Carnets ennéagramme</h1>
    <p class="ck-subtitle">Les personnes qui tiennent leur carnet « Le miroir intérieur » — sans code, par type.</p>

    <div class="ck-summary" id="summary-mount">
      <div class="ck-summary__card"><span class="ck-summary__n" id="s-total">·</span><span class="ck-summary__l">Total</span></div>
      <div class="ck-summary__card"><span class="ck-summary__n" id="s-today">·</span><span class="ck-summary__l">Aujourd'hui</span></div>
      <div class="ck-summary__card"><span class="ck-summary__n" id="s-week">·</span><span class="ck-summary__l">7 derniers jours</span></div>
      <div class="ck-summary__card"><span class="ck-summary__n" id="s-named">·</span><span class="ck-summary__l">Avec prénom</span></div>
    </div>

    <div class="ck-tools">
      <input type="search" id="search" placeholder="Filtrer par prénom, type ou id…" />
      <select id="sort">
        <option value="recent">Dernière visite ↓</option>
        <option value="old">Première visite ↑</option>
        <option value="prenom">Prénom A→Z</option>
        <option value="type">Type 1→9</option>
        <option value="jours">Plus de jours notés</option>
      </select>
    </div>

    <div id="carnets-mount" class="ck-carnets-grid">
      <div class="ck-state">Chargement des carnets…</div>
    </div>
  </main>

  <script type="module">
    import { db } from './assets/js/firebase-init.js';
    import { collection, getDocs }
      from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const TYPE_NOMS = {1:"L'Idéaliste",2:"Le Donneur",3:"Le Performeur",4:"L'Individualiste",5:"L'Observateur",6:"Le Loyaliste",7:"L'Enthousiaste",8:"Le Meneur",9:"Le Médiateur"};

    function esc(s) {
      return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function joursDepuis(date) {
      return Math.floor((Date.now() - date.getTime()) / 86400000);
    }
    function relatif(d) {
      if (!d) return 'jamais';
      const h = Math.floor((Date.now() - d.getTime()) / 3600000);
      const j = joursDepuis(d);
      if (h < 1) return 'à l\'instant';
      if (h < 24) return `il y a ${h}h`;
      if (j === 1) return 'hier';
      if (j < 30) return `il y a ${j} jours`;
      return d.toLocaleDateString('fr-FR', { day:'numeric', month:'long' });
    }
    function todayKey() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function tsToDate(ts) {
      if (!ts) return null;
      if (ts.toDate) return ts.toDate();
      try { return new Date(ts); } catch { return null; }
    }

    (async () => {
      const mount = document.getElementById('carnets-mount');
      try {
        // 1) Tous les carnets ennéagramme (collection 'carnets-type', le profil est sur le doc parent)
        const snap = await getDocs(collection(db, 'carnets-type'));

        // 2) Pour chacun : profil (doc parent) + comptage des jours
        const carnets = await Promise.all(snap.docs.map(async (d) => {
          const profil = d.data() || {};
          const joursSnap = await getDocs(collection(db, 'carnets-type', d.id, 'jours')).catch(() => null);
          let nbJours = 0, lastJour = null, notéAujourdhui = false;
          const today = todayKey();
          if (joursSnap) {
            joursSnap.forEach(jd => {
              nbJours++;
              if (jd.id === today) notéAujourdhui = true;
              if (!lastJour || jd.id > lastJour) lastJour = jd.id;
            });
          }
          return {
            id: d.id,
            prenom: profil.prenom || '',
            type: profil.type || null,
            firstSeen: tsToDate(profil.firstSeen),
            lastSeen: tsToDate(profil.lastSeen),
            nbJours, lastJour, notéAujourdhui
          };
        }));

        // 3) Stats
        document.getElementById('s-total').textContent = carnets.length;
        document.getElementById('s-today').textContent = carnets.filter(c => c.notéAujourdhui).length;
        document.getElementById('s-week').textContent = carnets.filter(c => c.lastSeen && joursDepuis(c.lastSeen) <= 7).length;
        document.getElementById('s-named').textContent = carnets.filter(c => c.prenom).length;

        // 4) Rendu
        const searchInput = document.getElementById('search');
        const sortSelect = document.getElementById('sort');
        function render() {
          const q = (searchInput.value || '').toLowerCase().trim();
          const sort = sortSelect.value;
          let list = carnets.filter(c => {
            if (!q) return true;
            const nom = (TYPE_NOMS[c.type] || '').toLowerCase();
            return c.id.toLowerCase().includes(q)
                || c.prenom.toLowerCase().includes(q)
                || ('type ' + (c.type || '')).includes(q)
                || nom.includes(q);
          });
          if (sort === 'recent') {
            list.sort((a, b) => (b.lastSeen?.getTime() || 0) - (a.lastSeen?.getTime() || 0));
          } else if (sort === 'old') {
            list.sort((a, b) => (a.firstSeen?.getTime() || Infinity) - (b.firstSeen?.getTime() || Infinity));
          } else if (sort === 'prenom') {
            list.sort((a, b) => (a.prenom || 'zzz').localeCompare(b.prenom || 'zzz'));
          } else if (sort === 'type') {
            list.sort((a, b) => (a.type || 99) - (b.type || 99));
          } else if (sort === 'jours') {
            list.sort((a, b) => b.nbJours - a.nbJours);
          }
          if (!list.length) {
            mount.innerHTML = '<div class="ck-state">Aucun carnet ne correspond.</div>';
            return;
          }
          mount.innerHTML = list.map(c => `
            <a class="ck-carnet-card" href="./miroir-carnet.html?id=${esc(c.id)}">
              <p class="ck-carnet-card__prenom">${c.prenom ? esc(c.prenom) : '<em style="color:#8a7a55; font-style:italic; font-size:1rem;">(anonyme)</em>'}</p>
              ${c.type ? `<span class="ck-carnet-card__type">Type ${esc(c.type)} — ${esc(TYPE_NOMS[c.type] || '')}</span>` : ''}
              <p class="ck-carnet-card__anon">${esc(c.id)}</p>
              <p class="ck-carnet-card__when">Dernière visite : ${relatif(c.lastSeen)}</p>
              <span class="ck-carnet-card__count">${c.nbJours} jour${c.nbJours > 1 ? 's' : ''} noté${c.nbJours > 1 ? 's' : ''}${c.notéAujourdhui ? ' · aujourd\'hui ✦' : ''}</span>
            </a>
          `).join('');
        }
        searchInput.addEventListener('input', render);
        sortSelect.addEventListener('change', render);
        render();
      } catch (e) {
        console.error(e);
        mount.innerHTML = `<div class="ck-state" style="color:#c44;">Erreur de chargement : ${esc(e.message || e)}</div>`;
      }
    })();
  </script>
</body>
</html>
