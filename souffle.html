<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Le souffle collectif · Cockpit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Amiri:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/cockpit.css" />
  <style>
    .ck-bar-row {
      display: grid; grid-template-columns: 8rem 1fr 3rem;
      gap: 0.8rem; align-items: center;
      padding: 0.4rem 0;
    }
    .ck-bar-row__name {
      font-family: var(--font-display); font-size: 1rem; color: var(--ink-title);
    }
    .ck-bar-row__name em { color: var(--gold); font-style: italic; }
    .ck-bar-row__bar {
      height: 12px; background: var(--paper); border-radius: 999px; overflow: hidden;
    }
    .ck-bar-row__fill {
      height: 100%; background: linear-gradient(90deg, var(--gold-soft), var(--gold));
      border-radius: 999px;
      transition: width 0.6s ease;
    }
    .ck-bar-row__n {
      font-family: var(--font-sans); font-size: 0.85rem;
      color: var(--ink-soft); text-align: right;
    }
    .ck-empty-section { color: var(--ink-mute); font-style: italic; }
  </style>
</head>
<body>

  <header class="ck-head">
    <div class="ck-head__inner">
      <div class="ck-head__brand">Cockpit · <em>La voie du dedans</em></div>
      <nav class="ck-head__nav">
        <a href="./tableau-de-bord.html">Tableau</a>
        <a href="./demandes.html">Demandes</a>
        <a href="./codes.html">Clés</a>
        <a href="./suggestions.html">Suggestions</a>
        <a href="./souffle.html" class="is-active">Souffle</a>
        <a href="./creer-cle.html">Créer</a>
        <a href="#" id="logout-link">Sortir</a>
      </nav>
    </div>
  </header>

  <main class="ck-main">
    <h1 class="ck-title">Le souffle collectif</h1>
    <p class="ck-subtitle">ce qui revient, ce qui pousse, ce qui se cherche — sans regarder personne en particulier</p>

    <div id="content">
      <div style="text-align:center; padding: var(--space-xl); color: var(--ink-mute); font-style: italic;">Lecture de tous les souffles… (cela peut prendre quelques secondes)</div>
    </div>
  </main>

  <script type="module">
    import { db } from './assets/js/firebase-init.js';
    import { requireAdmin, logout } from './assets/js/auth-guard.js';
    import { collection, getDocs, collectionGroup }
      from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    document.getElementById('logout-link').addEventListener('click', (e) => {
      e.preventDefault(); logout();
    });

    const content = document.getElementById('content');

    // labels pour traduire intentions et pratiques en clair
    const PRATIQUE_LABEL = {
      'parole.douceur':       'parler avec douceur',
      'parole.retenue':       'retenir une parole blessante',
      'parole.absent':        'ne pas parler d\'un absent',
      'acte.bien':            'faire un bien',
      'acte.parole':          'tenir une parole donnée',
      'acte.patience':        'être patient avec quelqu\'un',
      'coeur.observation':    'observer ce qui parle en soi',
      'coeur.silence':        'prendre un silence',
      'coeur.gratitude':      'reconnaître ce qu\'on a reçu',
      'lien.rappel':          'se souvenir',
      'lien.pardon':          'demander pardon',
      'lien.elevation':       'lever les yeux'
    };

    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function joursDepuis(date) {
      return Math.floor((Date.now() - date.getTime()) / (1000*60*60*24));
    }

    async function loadAll() {
      // tous les codes
      const codesSnap = await getDocs(collection(db, 'codes'));
      const codes = [];
      codesSnap.forEach(d => codes.push({ id: d.id, ...d.data() }));

      // tous les jours de tous les carnets
      const jours = [];
      for (const c of codes) {
        try {
          const joursSnap = await getDocs(collection(db, 'carnets', c.id, 'jours'));
          joursSnap.forEach(d => jours.push({
            codeId: c.id,
            date: d.id,
            ...d.data()
          }));
        } catch (e) {
          // pas de carnet pour ce code, on saute
        }
      }
      return { codes, jours };
    }

    function dateKey(daysAgo) {
      const d = new Date();
      d.setDate(d.getDate() - daysAgo);
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2, '0');
      const j = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${j}`;
    }
    function dateKeysLast(n) {
      const arr = [];
      for (let i = 0; i < n; i++) arr.push(dateKey(i));
      return arr;
    }

    function renderBarsTopN(data, top, totalLabel, labelMap) {
      const sorted = Object.entries(data).sort((a, b) => b[1] - a[1]).slice(0, top);
      const total = Object.values(data).reduce((a, b) => a + b, 0);
      if (!sorted.length || total === 0) {
        return `<p class="ck-empty-section">Pas encore de données.</p>`;
      }
      const max = sorted[0][1];
      return sorted.map(([k, n]) => {
        const pct = max > 0 ? Math.round(n / max * 100) : 0;
        const pctTotal = total > 0 ? Math.round(n / total * 100) : 0;
        const lbl = labelMap ? (labelMap[k] || k) : k;
        return `
          <div class="ck-bar-row">
            <div class="ck-bar-row__name">${esc(lbl)}</div>
            <div class="ck-bar-row__bar"><div class="ck-bar-row__fill" style="width:${pct}%;"></div></div>
            <div class="ck-bar-row__n">${pctTotal}%</div>
          </div>
        `;
      }).join('') + `<p style="margin-top:var(--space-sm); font-size:0.8rem; color:var(--ink-mute); font-style:italic;">sur ${total} ${totalLabel}</p>`;
    }

    function render({ codes, jours }) {
      const activeCodes = codes.filter(c => c.actif !== false);
      const inactiveCodes = codes.filter(c => c.actif === false);
      const last7  = new Set(dateKeysLast(7));
      const last30 = new Set(dateKeysLast(30));

      // — intentions de cette semaine
      const intentionsSemaine = {};
      const intentionsMois = {};
      jours.forEach(j => {
        const i = j.matin?.intentionId;
        if (!i) return;
        if (last7.has(j.date))  intentionsSemaine[i] = (intentionsSemaine[i] || 0) + 1;
        if (last30.has(j.date)) intentionsMois[i]    = (intentionsMois[i]    || 0) + 1;
      });

      // — pratiques le plus cochées "en partie" cette semaine
      const enPartieMois = {};
      const ouiMois = {};
      const nonMois = {};
      jours.forEach(j => {
        if (!last30.has(j.date)) return;
        const reps = j.soir?.reponses || {};
        Object.entries(reps).forEach(([pid, val]) => {
          if (val === 'partial') enPartieMois[pid] = (enPartieMois[pid] || 0) + 1;
          if (val === 'yes')     ouiMois[pid]     = (ouiMois[pid]     || 0) + 1;
          if (val === 'no')      nonMois[pid]     = (nonMois[pid]     || 0) + 1;
        });
      });

      // — rythme
      const joursNotesAujourdhui  = jours.filter(j => j.date === dateKey(0)).length;
      const joursNotesSemaine     = jours.filter(j => last7.has(j.date)).length;
      const joursNotesMois        = jours.filter(j => last30.has(j.date)).length;

      // — silences
      // pour chaque code actif, dernier login
      const silences = activeCodes.map(c => {
        let last = 0;
        try {
          last = c.dernierLogin?.toMillis?.() || 0;
        } catch {}
        return { code: c, last };
      });
      const silencieux = silences.filter(s => s.last > 0 && joursDepuis(new Date(s.last)) > 14).length;
      const jamaisConnectes = silences.filter(s => !s.last).length;

      // — langues
      const langues = { fr: 0, en: 0 };
      activeCodes.forEach(c => {
        const l = c.langue || 'fr';
        langues[l] = (langues[l] || 0) + 1;
      });

      content.innerHTML = `

        <section class="ck-section">
          <h2 class="ck-section__title">Le rythme du carnet</h2>
          <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap: var(--space-md);">
            <div class="ck-stat">
              <span class="ck-stat__n">${activeCodes.length}</span>
              <span class="ck-stat__l">Lampes actives</span>
            </div>
            <div class="ck-stat">
              <span class="ck-stat__n">${joursNotesAujourdhui}</span>
              <span class="ck-stat__l">Notés aujourd'hui</span>
            </div>
            <div class="ck-stat">
              <span class="ck-stat__n">${joursNotesSemaine}</span>
              <span class="ck-stat__l">Cette semaine</span>
            </div>
            <div class="ck-stat">
              <span class="ck-stat__n">${joursNotesMois}</span>
              <span class="ck-stat__l">Ce mois</span>
            </div>
          </div>
          ${silencieux > 0 || jamaisConnectes > 0 ? `
            <p style="margin-top: var(--space-md); font-family: var(--font-display); font-style: italic; color: var(--ink-mute);">
              ${silencieux > 0 ? `· ${silencieux} ${silencieux>1?'personnes':'personne'} en silence depuis plus de 14 jours.` : ''}
              ${jamaisConnectes > 0 ? `<br>· ${jamaisConnectes} ${jamaisConnectes>1?'clés':'clé'} créée${jamaisConnectes>1?'s':''} mais pas encore ouverte${jamaisConnectes>1?'s':''}.` : ''}
            </p>
          ` : ''}
          ${langues.en > 0 ? `<p style="margin-top: var(--space-sm); font-family: var(--font-display); font-style: italic; color: var(--ink-mute);">· ${langues.fr} en français, ${langues.en} en anglais</p>` : ''}
        </section>

        <section class="ck-section">
          <h2 class="ck-section__title">Les intentions de la semaine</h2>
          ${renderBarsTopN(intentionsSemaine, 8, 'intentions choisies cette semaine', null)}
        </section>

        <section class="ck-section">
          <h2 class="ck-section__title">Les intentions du mois</h2>
          ${renderBarsTopN(intentionsMois, 12, 'intentions choisies sur 30 jours', null)}
        </section>

        <section class="ck-section">
          <h2 class="ck-section__title">Les pratiques que la communauté travaille (cochées « en partie »)</h2>
          <p style="font-family:var(--font-display); font-style:italic; color: var(--ink-mute); margin-top: 0;">
            ce qui revient en « en partie » est un signal — pas un échec. C'est ce qu'on est en train de travailler.
          </p>
          ${renderBarsTopN(enPartieMois, 6, 'réponses « en partie » sur 30 jours', PRATIQUE_LABEL)}
        </section>

        <section class="ck-section">
          <h2 class="ck-section__title">Les pratiques qui fleurissent (cochées « oui »)</h2>
          ${renderBarsTopN(ouiMois, 6, 'réponses « oui » sur 30 jours', PRATIQUE_LABEL)}
        </section>

        <section class="ck-section">
          <h2 class="ck-section__title">Les pratiques qui résistent (cochées « non »)</h2>
          ${renderBarsTopN(nonMois, 6, 'réponses « non » sur 30 jours', PRATIQUE_LABEL)}
        </section>

        <p style="text-align:center; margin-top: var(--space-xl); font-family: var(--font-display); font-style: italic; color: var(--ink-mute); max-width: 32rem; margin-left: auto; margin-right: auto;">
          Tout ce qui apparaît ici est <strong>anonyme et agrégé</strong>. Aucun carnet individuel n'est lu pour ces chiffres — seules les réponses oui/partie/non et les intentions choisies sont comptées, sans jamais relier à qui les a écrites.
        </p>
      `;
    }

    requireAdmin(async () => {
      try {
        const data = await loadAll();
        render(data);
      } catch (e) {
        console.error(e);
        content.innerHTML = `<div style="text-align:center; padding:var(--space-xl); color:var(--ink-mute);">Une difficulté à lire les souffles. ${esc(e.message||'')}</div>`;
      }
    });
  </script>
</body>
</html>
